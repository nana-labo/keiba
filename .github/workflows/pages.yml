name: Deploy to GitHub Pages

# 静的サイトをそのまま Pages へ配信する（Actions 方式）。
# レガシーな branch ビルド(Jekyll)を使わないため "Page build failed" が発生しない。
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: 配信用ディレクトリを用意（.git/.github を除外）
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
          touch _site/.nojekyll

      - name: Pages 設定
        uses: actions/configure-pages@v5

      - name: 成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
